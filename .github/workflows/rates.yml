name: Update Mortgage Rates
on:
  schedule:
    - cron: '0 3 * * *' # 6:00 МСК
  workflow_dispatch:

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Run scripts to fetch financial data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node update_rates.js
          node update_inflation.js

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add rates.json inflation.json
          git commit -m "Автоматическое обновление финансовых данных (API ЦБ + Автономная инфляция)" || echo "No changes to commit"
          git push
