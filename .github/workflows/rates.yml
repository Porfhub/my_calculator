name: Update Mortgage Rates
on:
  schedule:
    - cron: '0 3 * * *' # Запуск каждый день (3:00 UTC = 6:00 МСК)
  workflow_dispatch: # Позволяет запускать кнопку обновления руками

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run script to fetch rates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node update_rates.js

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add rates.json
          git commit -m "Автоматическое обновление ставок ЦБ и банков" || echo "No changes to commit"
          git push
